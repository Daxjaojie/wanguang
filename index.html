<!-- 后台登录页 -->
    <div id="page-login" class="hidden">
        <div class="header">
            <h1>万广通 · 后台登录</h1>
            <p>💎 大小姐专属管理入口 · 非本人禁止进入</p>
        </div>
        <div class="login-box">
            <h3>🔐 身份验证</h3>
            <input type="text" id="username" class="input" placeholder="请输入账号" value="wanguang_admin">
            <input type="password" id="pwd" class="input" placeholder="请输入密码" value="Wgt@888888">
            <button class="btn" onclick="login()">立即登录</button>
            <button class="btn-gold" onclick="showPage('page-home')">返回首页</button>
        </div>
    </div>

    <!-- 后台管理页 -->
    <div id="page-admin" class="hidden">
        <div class="header">
            <h1>💎 我的管理后台</h1>
            <p>万广通 · 我说了算 · 全部由我做主</p>
        </div>
        <div class="admin-panel">
            <div class="card">
                <h3>✏️ 内容管理</h3>
                <p style="font-size:14px;line-height:1.6;">这里可以修改所有服务、价格、介绍文字，改完即时生效，平台完全听你的✨</p>
                <button class="btn">修改服务套餐</button>
                <button class="btn btn-gold">修改平台信息</button>
            </div>
            <div class="card">
                <h3>📊 数据查看</h3>
                <p style="font-size:14px;">访问量、订单数据全掌握，所有数据只对我开放</p>
            </div>
            <button class="btn" onclick="showPage('page-home')">退出后台</button>
        </div>
    </div>

    <div class="footer">
        <div class="footer-item active" onclick="showPage('page-home')">🏠 平台首页</div>
        <div class="footer-item">📢 我的推广</div>
        <div class="footer-item">📦 服务订单</div>
        <div class="footer-item" onclick="showPage('page-login')">🔐 我的后台</div>
    </div>

    <script>
        // 页面切换
        function showPage(pageId) {
            document.querySelectorAll('div[id^="page-"]').forEach(p => p.classList.add('hidden'));
            document.getElementById(pageId).classList.remove('hidden');
            // 底部导航高亮
            document.querySelectorAll('.footer-item').forEach(i => i.classList.remove('active'));
            event.target.classList.add('active');
        }
        // 登录验证
        function login() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('pwd').value;
            if(u === 'wanguang_admin' && p === 'Wgt@888888') {
                alert('✅ 登录成功！欢迎回来，大小姐～ 平台一切听你指挥✨');
                showPage('page-admin');
            } else {
                alert('❌ 账号或密码错啦，只有我能进哦～');
            }
        }
        // 直接访问后台链接处理
        window.onload = function() {
            if(window.location.hash === '#admin') {
                showPage('page-login');
            }
        }
    </script>
</body>
</html>
